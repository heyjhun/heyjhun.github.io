---
layout: page
title: Random Thoughts
description: Random thoughts are where I share random thoughts, stories, and encounters. It is like a journal, but random. Can I have a randomizer?
---
{% for post in site.categories.random-thoughts %}
  <a href="{{ site.github.url }}{{ post.url }}">
    <div class="featured-posts" {% if post.image %}style="background-image:url({{ site.github.url }}/assets/img/{{ post.image }})"{% endif %}>
      <h2><span>{{ post.title }}</span></h2>
    </div>
  </a>
{% endfor %}
